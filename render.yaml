databases:
  - name: careerneuron_db
    databaseName: careerneuron_db
    user: careerneuron_user
    plan: free

services:
  - type: web
    name: CareerNeuron-Pro
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    releaseCommand: python manage.py migrate --noinput
    startCommand: |
      python manage.py migrate --noinput
      gunicorn career_neuron.wsgi:application --workers 2 --worker-class sync --max-requests 1000 --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerneuron_db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: careerneuron-pro.onrender.com,www.careerneuron-pro.onrender.com
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
    autoDeploy: true
