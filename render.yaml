databases:
  - name: careerneuron_db
    ipAllowList: []

services:
  - type: web
    name: CareerNeuron-Pro
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate --noinput || true
      gunicorn career_neuron.wsgi:application --workers 2 --worker-class sync --max-requests 1000 --log-file -
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: careerneuron-pro.onrender.com,www.careerneuron-pro.onrender.com
    autoDeploy: true
