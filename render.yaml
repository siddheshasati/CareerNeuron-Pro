databases:
  - name: careerneuron_db
    databaseName: careerneuron_db
    user: careerneuron_user
    plan: free

services:
  - type: web
    name: CareerNeuron-Pro
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn career_neuron.wsgi:application --log-file -
    releaseCommand: python manage.py migrate
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: careerneuron_db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: careerneuron-pro.onrender.com,www.careerneuron-pro.onrender.com
    autoDeploy: true
