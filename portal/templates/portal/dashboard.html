{% extends 'portal/base.html' %}

{% block content %}
<section class="page-head">
    <div>
        <p class="eyebrow">Dashboard</p>
        <h1>Welcome, {{ user.first_name|default:user.email }}</h1>
    </div>
    <a href="{% url 'portal:job_match' %}" class="btn btn-primary">AutoMatch Jobs</a>
</section>

<section class="panel" style="margin-bottom: 2rem;">
    <form method="GET" action="{% url 'portal:dashboard' %}" class="match-search">
        <input type="text" name="q" class="form-control" placeholder="Search jobs, e.g. Java Developer" value="{{ query }}">
        <button type="submit" class="btn btn-secondary">Search</button>
    </form>
</section>

<div class="grid">
    {% for job in jobs %}
        <article class="panel job-card">
            <div>
                <h3 style="font-size: 1.2rem; margin-bottom: 0.5rem;">{{ job.title }}</h3>
                <div class="company">{{ job.company }} | {{ job.location }}</div>
            </div>
            <a href="{{ job.link }}" target="_blank" class="btn btn-secondary" style="margin-top: 1rem;">Apply Now</a>
        </article>
    {% empty %}
        <section class="panel empty-state" style="grid-column: 1 / -1;">
            <h3>No jobs found matching your search.</h3>
        </section>
    {% endfor %}
</div>
{% endblock %}
