{% extends 'portal/base.html' %}
{% block content %}
<h1>Admin Panel</h1>
<div class="glass-panel">
    <h2>Post a New Job</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Title</label><input type="text" name="title" class="form-control" required></div>
        <div class="form-group"><label>Company</label><input type="text" name="company" class="form-control" required></div>
        <div class="form-group"><label>Location</label><input type="text" name="location" class="form-control"></div>
        <div class="form-group"><label>Link</label><input type="url" name="link" class="form-control" required></div>
        <button type="submit" class="btn btn-primary">Save Job</button>
    </form>
</div>
{% endblock %}
